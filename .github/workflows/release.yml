name: Release

on:
  workflow_dispatch:
    inputs:
      major:
        description: "Major release?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          if [ "${{ inputs.major }}" = "true" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              COMMITS=$(git log --oneline)
            else
              COMMITS=$(git log ${LAST_TAG}..HEAD --oneline)
            fi

            if echo "$COMMITS" | grep -qE 'feat(\(.+\))?[!:]'; then
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
            else
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi

          echo "Calculated version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > tmp && mv tmp package.json

      - name: Update Cargo.toml version
        run: sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' src-tauri/Cargo.toml

      - name: Update tauri.conf.json version
        run: jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' src-tauri/tauri.conf.json > tmp && mv tmp src-tauri/tauri.conf.json

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag "v${{ steps.version.outputs.version }}" --strip header --output CHANGELOG_RELEASE.md

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cargo update --workspace
        working-directory: src-tauri

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Vigil v${{ steps.version.outputs.version }}" \
            --notes-file CHANGELOG_RELEASE.md

  build:
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      tag: v${{ needs.prepare.outputs.version }}
    secrets: inherit
